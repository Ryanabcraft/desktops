name: Build & Release

on:
  push:
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Install PyInstaller
        run: pip install pyinstaller
      - name: Build .exe
        run: pyinstaller --onefile --windowed --name="GDrive" --hidden-import=browser_launcher googledrive_app.py
      - name: Prepare dist_py
        run: New-Item -ItemType Directory -Path dist_py -Force; Copy-Item dist/GDrive.exe dist_py/GDrive.exe
      - name: Install Inno Setup
        run: choco install innosetup --no-progress
      - name: Build Installer
        run: iscc installer.iss
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist_py/GDrive.exe
            dist_installer/GoogleDrive-Setup.exe
          generate_release_notes: true
